<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta
      content="initial-scale=1.0, interactive-widget=resizes-content, maximum-scale=1.0, viewport-fit=cover, width=device-width"
      name="viewport"
    >
    <title>Starter</title>
		<style>
      @font-face {
        font-display: block;
        font-family: "Inter";
        font-weight: 400;
        src: url("/fonts/Inter-Regular.woff2") format("woff2");
      }

      @font-face {
        font-display: block;
        font-family: "Inter";
        font-weight: 500;
        src: url("/fonts/Inter-Medium.woff2") format("woff2");
      }

      @font-face {
        font-display: block;
        font-family: "Inter";
        font-weight: 600;
        src: url("/fonts/Inter-SemiBold.woff2") format("woff2");
      }

      @font-face {
        font-display: block;
        font-family: "Inter";
        font-weight: 700;
        src: url("/fonts/Inter-Bold.woff2") format("woff2");
      }

      body {
        font: 16px "Inter", sans-serif;
      }
		</style>
  </head>

  <body>
    <div id="root">
      <svg class="spinner" viewBox="25 25 50 50">
        <circle
          cx="50"
          cy="50"
          fill="none"
          r="20"
          stroke="#0baac9"
          stroke-dasharray="89 200"
          stroke-dashoffset="0"
          stroke-miterlimit="10"
          stroke-width="5"
        ></circle>
      </svg>
    </div>
  </body>
</html>
